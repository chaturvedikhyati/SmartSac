<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - SmartSac</title>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="page-with-sidebar">
  <!-- Navbar -->
  <nav class="navbar"></nav>

  <!-- Sidebar -->
  <aside class="sidebar">
    <a href="/dashboard.html" class="sidebar-logo">
      <span class="sidebar-logo-icon">🌱</span>
      <span>SmartSac</span>
    </a>

    <ul class="sidebar-nav">
      <li class="sidebar-nav-item">
        <a href="/dashboard.html" class="sidebar-nav-link active">
          <span class="sidebar-nav-icon">📊</span>
          <span>Dashboard</span>
        </a>
      </li>
      <li class="sidebar-nav-item">
        <a href="/upload.html" class="sidebar-nav-link">
          <span class="sidebar-nav-icon">📸</span>
          <span>Upload</span>
        </a>
      </li>
      <li class="sidebar-nav-item">
        <a href="/history.html" class="sidebar-nav-link">
          <span class="sidebar-nav-icon">📋</span>
          <span>History</span>
        </a>
      </li>
      <li class="sidebar-nav-item">
        <a href="/admin.html" class="sidebar-nav-link">
          <span class="sidebar-nav-icon">⚙️</span>
          <span>Admin</span>
        </a>
      </li>
    </ul>

    <div class="sidebar-user">
      <div class="sidebar-avatar">U</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name">User</div>
        <div class="sidebar-user-email">user@example.com</div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main>
    <div class="page-content">
      <!-- Header -->
      <div class="dashboard-header">
        <h1 class="dashboard-title">Dashboard</h1>
        <div class="dashboard-actions">
          <a href="/upload.html" class="btn btn-primary">Classify Now</a>
        </div>
      </div>

      <!-- Stat Cards -->
      <div class="stat-cards">
        <!-- Cards filled by JavaScript -->
      </div>

      <!-- Charts Section -->
      <div class="charts-section">
        <!-- Category Distribution Chart -->
        <div class="chart-card">
          <h3 class="chart-title">Waste Category Distribution</h3>
          <div class="chart-container">
            <div id="category-chart" class="donut-chart"></div>
            <div class="chart-legend"></div>
          </div>
        </div>

        <!-- Timeline Chart -->
        <div class="chart-card">
          <h3 class="chart-title">Classification Timeline</h3>
          <div class="chart-container">
            <div id="timeline-chart" class="bar-chart"></div>
          </div>
        </div>
      </div>

      <!-- Recent Activity -->
      <div class="activity-section">
        <h3 class="activity-title">Recent Classifications</h3>
        <div class="admin-table-wrapper">
          <table class="activity-table">
            <thead>
              <tr>
                <th>Item</th>
                <th>Category</th>
                <th>Date</th>
                <th>Score</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="5" style="text-align: center; padding: 40px;">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/core/api.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/core/router.js"></script>
  <script src="js/core/theme.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/loader.js"></script>
  <script src="js/components/navbar.js"></script>
  <script src="js/utils/formatters.js"></script>
  <script src="js/utils/validators.js"></script>
  <script src="js/pages/dashboard.js"></script>
</body>
</html>
